  +'<div class="lgrow"><span class="dot" style="background:#00c48c"></span> p-value &lt; 0.01 (highly significant)</div>'
  +'<div class="lgrow"><span class="dot" style="background:#4ecdc4"></span> p-value &lt; 0.05 (significant)</div>'
  +'<div class="lgrow"><span class="dot" style="background:#4a7fff"></span> p-value &lt; 0.10 (marginal)</div>'
  +'<div class="lgrow"><span class="dot" style="background:#ffa94d"></span> p-value ≥ 0.10 (not significant)</div>'
  +'<div class="lgrow"><span class="dot" style="background:#ff6b6b"></span> Coefficient in <span style="color:var(--red);font-weight:600">red</span> = violates validity: <span id="lgV"></span></div>'
  +'</div>';
}

// NAV
function rNav(){document.getElementById('qn').innerHTML=KS.map(k=>'<div class="qb '+(k===cQ?'on':'')+'" data-q="'+k+'">'+Q[k].label+'</div>').join('');document.querySelectorAll('.qb').forEach(b=>b.onclick=()=>{cQ=b.dataset.q;rAll();});}

// INFO
function rInfo(){
 const d=Q[cQ],mp=d.mean_params;
 let arima='';
 if(mp.type==='MA(1)')arima=d.stationarity==='first_diff'?'ARIMA(0,1,1)':'ARMA(0,1)';
 else if(mp.type==='AR(1)')arima=d.stationarity==='first_diff'?'ARIMA(1,1,0)':'ARMA(1,0)';
 else if(mp.type==='AR(2)')arima=d.stationarity==='first_diff'?'ARIMA(2,1,0)':'ARMA(2,0)';
 else if(mp.type==='AR(3)')arima=d.stationarity==='first_diff'?'ARIMA(3,1,0)':'ARMA(3,0)';
 else arima=d.stationarity==='first_diff'?'ARIMA(0,1,0)':'WN';
 const cs=[
  {l:'Stationarity',v:d.stationarity==='first_diff'?'I(1)':'Broken I(0)',c:'va',dt:d.stationarity==='first_diff'?'First-differenced':'Detrended at '+d.za_break},
  {l:'ZA Break',v:d.za_break,c:'vo',dt:'Zivot-Andrews'},
  {l:'Mean Model',v:arima,c:'va',dt:mp.type},
  {l:'Var. Break',v:d.var_break,c:'vr',dt:'Sup-Wald'},
  {l:'N',v:d.residuals.length,c:'va',dt:'Obs. after extraction'},
  {l:'Top Model',v:d.top_models[0]?SM[d.top_models[0]].sh:'—',c:'vg',dt:'Best valid AIC'},
 ];
 document.getElementById('ib').innerHTML=cs.map(c=>'<div class="ic"><div class="l">'+c.l+'</div><div class="v '+c.c+'">'+c.v+'</div><div class="d">'+c.dt+'</div></div>').join('');
}

// SERIES — general form equation
function rSeries(){
 const d=Q[cQ],mp=d.mean_params;
 let arimaLabel='',meanEq='';
 if(mp.type==='MA(1)'){
  arimaLabel=d.stationarity==='first_diff'?'ARIMA(0,1,1)':'ARMA(0,1)';
  meanEq='\\Delta y_t = \\mu + \\theta\\,\\hat{\\varepsilon}_{t-1} + \\hat{\\varepsilon}_t';
 } else if(mp.type==='AR(1)'){
  arimaLabel=d.stationarity==='first_diff'?'ARIMA(1,1,0)':'ARMA(1,0)';
  meanEq='\\tilde{y}_t = c + \\varphi_1\\,\\tilde{y}_{t-1} + \\hat{\\varepsilon}_t';
 } else if(mp.type==='AR(2)'){
  arimaLabel=d.stationarity==='first_diff'?'ARIMA(2,1,0)':'ARMA(2,0)';
  meanEq='\\tilde{y}_t = c + \\varphi_1\\,\\tilde{y}_{t-1} + \\varphi_2\\,\\tilde{y}_{t-2} + \\hat{\\varepsilon}_t';
 } else if(mp.type==='AR(3)'){
  arimaLabel=d.stationarity==='first_diff'?'ARIMA(3,1,0)':'ARMA(3,0)';
  meanEq='\\tilde{y}_t = c + \\varphi_1\\,\\tilde{y}_{t-1} + \\varphi_2\\,\\tilde{y}_{t-2} + \\varphi_3\\,\\tilde{y}_{t-3} + \\hat{\\varepsilon}_t';
 } else {
  arimaLabel=d.stationarity==='first_diff'?'ARIMA(0,1,0)':'White Noise';
  meanEq='\\Delta y_t = \\mu + \\hat{\\varepsilon}_t';
 }
 
 const p=document.getElementById('p-series');
 p.innerHTML='<div class="cd"><div style="font-size:12px;color:var(--txd);margin-bottom:4px;">Conditional Mean Specification: <strong style="color:var(--ac)">'+arimaLabel+'</strong></div><div class="eq"><span id="mEq"></span></div></div>'
  +'<div class="g2">'
  +'<div class="cd"><h3>Panel A: Income Share Levels</h3><div class="cs">ZA structural break at '+d.za_break+' (red dashed)</div><canvas id="c1"></canvas></div>'
  +'<div class="cd"><h3>Panel B: Stationary Series</h3><div class="cs">'+(d.stationarity==='first_diff'?'First differences':'Detrended residuals')+'</div><canvas id="c2"></canvas></div>'
  +'</div><div class="g2">'
  +'<div class="cd"><h3>Panel C: Extracted Residuals</h3><div class="cs">After '+arimaLabel+' conditional mean specification</div><canvas id="c3"></canvas></div>'
  +'<div class="cd"><h3>Panel D: Variance Proxy</h3><div class="cs">Sup-Wald break at '+d.var_break+' (red dashed). Squared residuals.</div><canvas id="c4"></canvas></div>'
  +'</div>';
 K(document.getElementById('mEq'),meanEq);
 setTimeout(()=>{
  CH.c1=mc('c1',d.years,[{label:d.label,data:d.levels,borderColor:'#3b9eff',borderWidth:1.3,fill:false}],{by:d.za_break,pct:true});
  CH.c2=mc('c2',d.stat_years,[{label:'Stationary',data:d.stat_series,borderColor:'#6c5ce7',borderWidth:1.1,fill:false}],{by:d.za_break,dc:4});
  CH.c3=mc('c3',d.resid_years,[{label:'Residuals',data:d.residuals,borderColor:'#4ecdc4',borderWidth:1.1,fill:false}],{by:d.var_break,dc:5});
  CH.c4=mc('c4',d.resid_years,[{label:'Squared Resid.',data:d.sq_residuals,borderColor:'#ffa94d',borderWidth:1.1,backgroundColor:'rgba(255,169,77,.06)',fill:true}],{by:d.var_break,dc:8});
 },60);
}

// TABLE
function rTable(){
 const d=Q[cQ],tops=d.top_models||[];
 const p=document.getElementById('p-table');
 
 let h=legendHtml();
 
 h+='<div class="cd"><h3>All Estimated Specifications — '+d.label+'</h3>'
  +'<div class="cs">Residuals scaled ×100. Break dummy: <span id="dtT"></span></div>'
  +'<div style="overflow-x:auto"><table><thead><tr>'
  +'<th>Specification</th><th>LL</th><th>AIC</th><th>BIC</th>'
  +'<th><span id="h_a1"></span></th><th>p-val</th>'
  +'<th><span id="h_b1"></span></th><th>p-val</th>'
  +'<th><span id="h_d"></span></th><th>p-val</th>'
  +'<th><span id="h_l"></span></th><th>p-val</th>'
  +'<th><span id="h_n"></span></th><th>p-val</th>'
  +'<th>Status</th></tr></thead><tbody>';
 
 for(const sk of SO){
  const r=d.specs[sk];
  if(!r||!r.converged){h+='<tr><td>'+SM[sk].n+'</td><td colspan="14" style="color:var(--red)">Failed to converge</td></tr>';continue;}
  const rank=tops.indexOf(sk);const pv=r.pvalues||{};
  let status='';
  if(rank===0)status='<span class="badge b1">★ TOP 1</span>';
  else if(rank===1)status='<span class="badge b2">TOP 2</span>';
  else if(rank===2)status='<span class="badge b3">TOP 3</span>';
  if(r.issues&&r.issues.length>0)status+='<span class="wrn"> '+r.issues.join(', ')+'</span>';
  
  const hasB=(r.beta1!==undefined);
  const hasD=(r.delta!==undefined&&r.delta!==0);
  const hasL=(r.lambda!==undefined&&r.lambda!==0);
  const hasN=(r.nu!==undefined&&r.nu<99);
  
  h+='<tr class="'+(rank===0?'best':'')+'">'
   +'<td style="font-weight:'+(rank>=0&&rank<3?600:400)+';color:'+(rank===0?'var(--grn)':rank===1?'var(--ac)':rank===2?'var(--ac2)':'var(--tx)')+'">'+SM[sk].n+'</td>'
   +'<td>'+r.LL.toFixed(2)+'</td>'
   +'<td style="color:'+(rank===0?'var(--grn)':'inherit')+'">'+r.AIC.toFixed(2)+'</td>'
   +'<td>'+r.BIC.toFixed(2)+'</td>'
   +'<td style="color:'+coefC('alpha1',r.alpha1,r)+'">'+fV(r.alpha1)+'</td><td>'+pvH(pv.alpha1)+'</td>'
   +'<td style="color:'+(hasB?coefC('beta1',r.beta1,r):'var(--txd)')+'">'+( hasB?fV(r.beta1):'—')+'</td><td>'+(hasB?pvH(pv.beta1):'—')+'</td>'
   +'<td>'+(hasD?fV(r.delta):'—')+'</td><td>'+(hasD?pvH(pv.delta):'—')+'</td>'
   +'<td>'+(hasL?fV(r.lambda):'—')+'</td><td>'+(hasL?pvH(pv.lambda):'—')+'</td>'
   +'<td>'+(hasN?r.nu.toFixed(2):'—')+'</td><td>'+(hasN?pvH(pv.nu):'—')+'</td>'
   +'<td>'+status+'</td></tr>';
 }
 h+='</tbody></table></div></div>';
 
 // Top models
 h+='<div class="cd"><h3>Selected Models (Valid, Best AIC)</h3>';
 for(let i=0;i<tops.length;i++){
  const m=d.specs[tops[i]];const meta=SM[tops[i]];
  h+='<div style="margin-bottom:12px;padding:12px;background:var(--s2);border-radius:6px;border-left:3px solid '+['var(--grn)','var(--ac)','var(--ac2)'][i]+'">'
   +'<div style="font-weight:600;margin-bottom:4px;">'+meta.n+' <span class="badge '+['b1','b2','b3'][i]+'">'+['★ BEST','RUNNER-UP','THIRD'][i]+'</span></div>'
   +'<div class="eq"><span id="tE'+i+'"></span></div>'
   +'<div style="font-size:11px;color:var(--txd);margin-top:4px;">LL = '+m.LL.toFixed(2)+' · AIC = '+m.AIC.toFixed(2)+' · BIC = '+m.BIC.toFixed(2)+'</div>'
   +'</div>';
 }
 h+='</div>';
 p.innerHTML=h;
 
 // KaTeX post-render
 for(let i=0;i<tops.length;i++){const el=document.getElementById('tE'+i);if(el)K(el,SM[tops[i]].eq);}
 K(document.getElementById('h_a1'),'\\alpha_1');K(document.getElementById('h_b1'),'\\beta_1');
 K(document.getElementById('h_d'),'\\delta');K(document.getElementById('h_l'),'\\lambda');K(document.getElementById('h_n'),'\\nu');
 K(document.getElementById('dtT'),'D_t=1\\text{ for }t\\geq '+d.var_break);
 const lgv=document.getElementById('lgV');if(lgv)K(lgv,'\\alpha_1>1,\\;\\alpha_1<0,\\;\\beta_1<0,\\;\\alpha_1+\\beta_1>1');
}

// VOLATILITY
function rVol(){
 const d=Q[cQ],p=document.getElementById('p-vol');
 const sks=SO.filter(k=>d.specs[k]&&d.specs[k].converged);
 if(!sks.includes(cS))cS=sks[0];
 
 p.innerHTML='<div class="ms" id="vs"></div>'
  +'<div class="cd"><h3 id="vT"></h3><div class="cs" id="vS"></div><canvas id="cV" style="height:300px!important"></canvas></div>'
  +'<div class="cd" id="vD"></div>';
 
 const sel=document.getElementById('vs');
 sel.innerHTML=sks.map(k=>'<div class="ml '+(k===cS?'on':'')+'" data-s="'+k+'">'+SM[k].sh+'</div>').join('');
 sel.querySelectorAll('.ml').forEach(b=>b.onclick=()=>{cS=b.dataset.s;sel.querySelectorAll('.ml').forEach(x=>x.classList.remove('on'));b.classList.add('on');uVol();});
 uVol();
}

function uVol(){
 const d=Q[cQ],r=d.specs[cS];if(!r||!r.converged)return;
 document.getElementById('vT').textContent='Conditional Volatility: '+SM[cS].n;
 const sub=document.getElementById('vS');sub.innerHTML='<span id="vEq"></span><span style="color:var(--txd);margin-left:12px;">(squared residuals ×100 shown as variance proxy)</span>';
 K(document.getElementById('vEq'),SM[cS].eq);
 
 const eps=d.residuals.map(v=>v*100),dummy=d.resid_years.map(y=>y>=d.var_break?1:0);
 const cv=compCV(eps,r,dummy);
 const sqR=d.sq_residuals.map(v=>v*1e4);
 
 if(CH.cV)CH.cV.destroy();
 CH.cV=mc('cV',d.resid_years,[
  {label:'ε̂²×100 (variance proxy)',data:sqR,borderColor:'rgba(255,169,77,.3)',borderWidth:.7,fill:false,order:2},
  {label:'σ̂ₜ (cond. std. dev.)',data:cv,borderColor:'#3b9eff',borderWidth:2,fill:false,order:1},
 ],{by:d.var_break,dc:3});
 
 // Full parameter table — show ALL params even invalid ones, flag with red
 const pv=r.pvalues||{},se=r.se||{};
 const params=[['omega','\\alpha_0'],['alpha1','\\alpha_1'],['beta1','\\beta_1'],['delta','\\delta'],['lambda','\\lambda'],['nu','\\nu']];
 
 // Issues in LaTeX
 let issueHtml='';
 if(r.issues&&r.issues.length>0){
  issueHtml='<div style="color:var(--red);margin-bottom:8px;font-size:11px;">⚠ Validity issues: <span id="vIss"></span></div>';
 }
 
 let dt='<h3>Specification Detail</h3>'
  +'<div style="font-size:11px;color:var(--txd);margin-bottom:6px;">LL = '+r.LL.toFixed(2)+' · AIC = '+r.AIC.toFixed(2)+' · BIC = '+r.BIC.toFixed(2)+'</div>'
  +issueHtml
  +'<table style="max-width:700px"><tr><th>Parameter</th><th>Value</th><th>SE</th><th>p-value</th></tr>';
 
 for(const [pk,plbl] of params){
  const val=r[pk];
  if(val===undefined)continue;
  // Show the row even if value is 0 or invalid
  const cc=coefC(pk,val,r);
  dt+='<tr><td><span id="vp_'+pk+'"></span></td>'
   +'<td style="color:'+cc+';font-weight:'+(cc==='var(--red)'?700:400)+'">'+val.toFixed(6)+'</td>'
   +'<td>'+(se[pk]?se[pk].toFixed(6):'—')+'</td>'
   +'<td>'+pvH(pv[pk])+'</td></tr>';
 }
 dt+='</table>';
 document.getElementById('vD').innerHTML=dt;
 
 // KaTeX renders for param names
 for(const [pk,plbl] of params){const el=document.getElementById('vp_'+pk);if(el)K(el,plbl);}
 // Issues LaTeX
 if(r.issues&&r.issues.length>0){
  const issEl=document.getElementById('vIss');
  if(issEl){
   const issMap={'a1>1':'\\alpha_1>1','a1<0':'\\alpha_1<0','b1<0':'\\beta_1<0','b1>1':'\\beta_1>1','a1+b1>1':'\\alpha_1+\\beta_1>1','df→2':'\\nu\\to 2'};
   const tex=r.issues.map(i=>issMap[i]||i).join(',\\;');
   K(issEl,tex);
  }
 }
}

// INTERPRETATION
function rInterp(){
 const d=Q[cQ],tops=d.top_models||[],p=document.getElementById('p-interp');
 
 let h='<div class="ip"><h4>Pipeline Summary: '+d.label+'</h4>'
  +'<p>The series is classified as <span class="hl">'+(d.stationarity==='first_diff'?'I(1) — first-differenced':'broken-trend I(0) — detrended at '+d.za_break)+'</span>. '
  +'The conditional mean specification is <span class="hl">'+d.mean_params.type+'</span>. '
  +'After residuals extraction, the Sup-Wald test identifies a variance break at <span class="pm">'+d.var_break+'</span>.</p></div>';
 
 // Selection criteria — plain text, no broken KaTeX
 h+='<div class="ip"><h4>Selected Models (up to 3, all mathematically valid)</h4>'
  +'<div class="lgbox">'
  +'<div style="margin-bottom:4px;">Selection criteria: lowest AIC among models satisfying all of:</div>'
  +'<div class="lgrow">• <span id="cr1"></span></div>'
  +'<div class="lgrow">• <span id="cr2"></span></div>'
  +'<div class="lgrow">• <span id="cr3"></span></div>'
  +'<div class="lgrow">• <span id="cr4"></span></div>'
  +'</div>';
 
 for(let i=0;i<tops.length;i++){
  const k=tops[i],r=d.specs[k],meta=SM[k],pv=r.pvalues||{};
  h+='<div style="margin:10px 0;padding:14px;background:var(--s2);border-radius:6px;border-left:3px solid '+['var(--grn)','var(--ac)','var(--ac2)'][i]+'">'
   +'<div style="font-weight:600;margin-bottom:6px;">'+meta.n+' <span class="badge '+['b1','b2','b3'][i]+'">'+['★ BEST','RUNNER-UP','THIRD'][i]+'</span></div>'
   +'<div class="eq"><span id="iE'+i+'"></span></div>'
   +'<div style="font-size:11px;margin-top:6px;">LL = '+r.LL.toFixed(2)+' · AIC = '+r.AIC.toFixed(2)+' · BIC = '+r.BIC.toFixed(2)+'</div>'
   +'<details style="margin-top:8px;"><summary style="cursor:pointer;font-size:12px;color:var(--ac);">Show coefficient details</summary>'
   +'<div style="margin-top:8px;font-size:12px;line-height:1.8;">';
  
  const params=[['alpha1','\\alpha_1'],['beta1','\\beta_1'],['delta','\\delta'],['lambda','\\lambda'],['nu','\\nu']];
  for(const [pk,plbl] of params){
   const val=r[pk];
   if(val===undefined||(val===0&&pk!=='nu'))continue;
   const cc=coefC(pk,val,r);
   h+='<p><span id="ip_'+pk+'_'+i+'"></span> = <span style="color:'+cc+'">'+val.toFixed(4)+'</span> (p = '+pvH(pv[pk])+')</p>';
  }
  h+='</div></details></div>';
 }
 h+='</div>';
 
 // Regime
 const vb=d.var_break;
 const bestK=tops[0]||'';const bestR=d.specs[bestK]||{};const hasGarch=bestR.beta1&&bestR.beta1>0.3;
 let regime='';
 if(vb>=1965)regime='<strong>Regime A (Bottom Tail)</strong>: Policy-stabilized. Break at '+vb+'. No GARCH persistence. Safety-net programs permanently reduced volatility.';
 else if(vb>=1941&&vb<=1952&&hasGarch)regime='<strong>Regime B (Broad Middle)</strong>: Rolling business-cycle persistence with wartime break. GARCH autocorrelation significant.';
 else if(vb>=1941&&vb<=1952)regime='<strong>Regime C (Upper-Middle to Top 1%)</strong>: Great Compression regime shift. No GARCH persistence.';
 else if(vb<=1935)regime='<strong>Regime D (Ultra-Top)</strong>: Depression-era break at '+vb+'. Financial-market dynamics. Student-t essential.';
 else regime='Transition quantile.';
 h+='<div class="ip"><h4>Volatility Regime Classification</h4><p>'+regime+'</p></div>';
 
 p.innerHTML=h;
 
 // Post-render KaTeX
 K(document.getElementById('cr1'),'\\alpha_1 \\in [0,\\,1]');
 K(document.getElementById('cr2'),'\\beta_1 \\geq 0');
 K(document.getElementById('cr3'),'\\alpha_1+\\beta_1 \\leq 1');
 K(document.getElementById('cr4'),'\\nu > 2');
 for(let i=0;i<tops.length;i++){
  const el=document.getElementById('iE'+i);if(el)K(el,SM[tops[i]].eq);
  const params=[['alpha1','\\alpha_1'],['beta1','\\beta_1'],['delta','\\delta'],['lambda','\\lambda'],['nu','\\nu']];
  for(const [pk,plbl] of params){const el2=document.getElementById('ip_'+pk+'_'+i);if(el2)K(el2,plbl);}
 }
}

// TABS
document.getElementById('tbs').onclick=e=>{const t=e.target.closest('.tb');if(!t)return;document.querySelectorAll('.tb').forEach(x=>x.classList.remove('on'));t.classList.add('on');document.querySelectorAll('.pn').forEach(x=>x.classList.remove('sh'));document.getElementById('p-'+t.dataset.p).classList.add('sh');dC();const pp=t.dataset.p;if(pp==='series')rSeries();else if(pp==='table')rTable();else if(pp==='vol')rVol();else if(pp==='interp')rInterp();};

function rAll(){document.querySelectorAll('.qb').forEach(b=>b.classList.toggle('on',b.dataset.q===cQ));dC();rInfo();const at=document.querySelector('.tb.on');const pp=at?at.dataset.p:'series';if(pp==='series')rSeries();else if(pp==='table')rTable();else if(pp==='vol')rVol();else if(pp==='interp')rInterp();}

rNav();rAll();
</script></body></html>
